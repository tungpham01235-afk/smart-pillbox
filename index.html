<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pillbox - Hệ thống thông minh</title>
    <style>
        :root { --primary: #3498db; --danger: #e74c3c; --success: #2ecc71; --bg: #f4f6f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2c3e50; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .msg { padding: 10px; margin: 10px 0; border-radius: 4px; font-size: 14px; text-align: center; display: none; }
        .error { background: #fadbd8; color: var(--danger); display: block; }
        .success { background: #d4edda; color: var(--success); display: block; }
        .hidden { display: none; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="authBox">
    <h2 id="title">Đăng Nhập</h2>
    <div id="msgBox" class="msg"></div>
    
    <div id="formFields">
        <input type="text" id="name" placeholder="Họ và tên" class="hidden">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mật khẩu">
    </div>
    
    <button id="mainBtn" onclick="handleAuth()">Đăng Nhập</button>
    <p class="toggle-link" id="toggleLink" onclick="toggleMode()">Chưa có tài khoản? Đăng ký ngay</p>
</div>

<div class="card hidden" id="otpBox">
    <h2>Xác thực OTP</h2>
    <p style="text-align: center; font-size: 14px;">Nhập mã 6 số gửi tới email của bạn.</p>
    <input type="text" id="otp" placeholder="000000">
    <button onclick="verifyOTP()">Xác thực</button>
    <p style="text-align: center; margin-top: 15px; font-size: 13px;">
        Không nhận được? <button id="resendBtn" onclick="resendOTP()" style="width: auto; background: none; color: var(--primary); border: none; font-weight: bold; cursor: pointer;">Gửi lại</button>
    </p>
</div>

<script>
    // URL Backend của bạn
    const API_URL = 'https://smart-pillbox-your-app.up.railway.app/api'; 
    let isLogin = true;

    function showMsg(text, type) {
        const box = document.getElementById('msgBox');
        box.innerText = text;
        box.className = `msg ${type}`;
    }

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? 'Đăng Nhập' : 'Đăng Ký';
        document.getElementById('mainBtn').innerText = isLogin ? 'Đăng Nhập' : 'Đăng Ký';
        document.getElementById('name').classList.toggle('hidden', isLogin);
        document.getElementById('toggleLink').innerText = isLogin ? 'Chưa có tài khoản? Đăng ký ngay' : 'Đã có tài khoản? Đăng nhập';
        document.getElementById('msgBox').className = 'msg';
    }

    async function handleAuth() {
        const btn = document.getElementById('mainBtn');
        btn.disabled = true;
        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            name: document.getElementById('name').value
        };

        try {
            const res = await fetch(`${API_URL}/${isLogin ? 'login' : 'register'}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message);

            if (isLogin) {
                localStorage.setItem('token', data.token);
                showMsg('Đăng nhập thành công!', 'success');
                // Chuyển hướng vào Dashboard tại đây...
            } else {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('otpBox').classList.remove('hidden');
            }
        } catch (err) {
            showMsg(err.message, 'error');
            btn.disabled = false;
        }
    }

    async function verifyOTP() {
        const email = document.getElementById('email').value;
        const otp = document.getElementById('otp').value;
        const res = await fetch(`${API_URL}/verify-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, otp })
        });
        const data = await res.json();
        if (res.ok) {
            alert('Xác thực thành công! Giờ bạn có thể đăng nhập.');
            location.reload();
        } else {
            showMsg(data.message, 'error');
        }
    }

    async function resendOTP() {
        const btn = document.getElementById('resendBtn');
        btn.disabled = true;
        let timeLeft = 60;
        
        try {
            await fetch(`${API_URL}/register`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('email').value, name: 'User', password: 'temp' }) 
            });
            
            const timer = setInterval(() => {
                timeLeft--;
                btn.innerText = `Gửi lại (${timeLeft}s)`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = 'Gửi lại';
                }
            }, 1000);
        } catch (err) {
            showMsg('Lỗi gửi lại mã!', 'error');
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
